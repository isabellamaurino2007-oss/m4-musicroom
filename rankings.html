<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MusicRoom - Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="header.jpg" class="header-banner" alt="Banner">
        <div class="header-overlay">
            <h1>MusicRoom</h1>
            <input type="text" placeholder="BUSCAR ARTISTA, CANCIÓN O ÁLBUM">
        </div>
        <nav>
    <a href="index.html">INICIO</a>
    <a href="rankings.html">RANKING</a>
    <a href="crear.html">CREAR</a>
    <a href="fav.html">FAV</a>
    <a href="perfil.html">PERFIL</a>
</nav>
    </header>

    <main>
        <!-- SECCIÓN DE LOS 3 DISCOS -->
        <section>
            <h2>RANKINGS</h2>
            <div class="flex-container">
                <div class="card">
                    <div class="img-container"><img src="disco1.jpg"></div>
                    <p class="name">VIEWS ★★★★★</p>
                    <p class="artist">DRAKE</p>
                </div>
                <div class="card">
                    <div class="img-container"><img src="disco2.jpg"></div>
                    <p class="name">SONDER SON ★★★★★</p>
                    <p class="artist">BRENT FAIYAZ</p>
                </div>
                <div class="card">
                    <div class="img-container"><img src="disco3.jpg"></div>
                    <p class="name">STARBOY ★★★★★</p>
                    <p class="artist">THE WEEKND</p>
                </div>
            </div>
        </section>

        <!-- SECCIÓN DE NUEVOS RANKINGS (CON FONDO IMAGEN) -->
        <section class="nuevos-rankings-section background-header">
            <div class="stars-banner">★★ NUEVOS RANKINGS ★★</div>
            <input type="text" class="big-input" placeholder="SELECCIONA TU CANCIÓN, ÁLBUM O ARTISTA">
            <div class="rankea-box">
                <p>RANKEA</p>
                <div class="big-stars">☆☆☆☆☆</div>
            </div>
        </section>
    </main>
</body>
</html>
